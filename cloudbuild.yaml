substitutions:
  _REGION: europe-west1
  _SERVICE: stocksage
  _IMAGE: europe-west1-docker.pkg.dev/stocks-age/stocksage/stocksage

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_API_KEY=AIzaSyBOs84m_Ac7uQg_h0Nt3CTtPMHLD6uKq4c
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=stocks-age.firebaseapp.com
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_PROJECT_ID=stocks-age
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=stocks-age.firebasestorage.app
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=345955459293
      - --build-arg
      - NEXT_PUBLIC_FIREBASE_APP_ID=1:345955459293:web:f9c88c0e1b0fda75a8bb34
      - --build-arg
      - NEXT_PUBLIC_APP_URL=https://stocksage.io
      - --build-arg
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=$_NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      - -t
      - $_IMAGE:$SHORT_SHA
      - -t
      - $_IMAGE:latest
      - .

  - name: gcr.io/cloud-builders/docker
    args: [push, --all-tags, $_IMAGE]

  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - $_SERVICE
      - --image=$_IMAGE:$SHORT_SHA
      - --region=$_REGION
      - --platform=managed
      - --allow-unauthenticated
      - --memory=1Gi
      - --cpu=1
      - --min-instances=1
      - --max-instances=10
      - --set-env-vars=FIREBASE_ADMIN_PROJECT_ID=stocks-age,NEXT_PUBLIC_APP_URL=https://stocksage.io
      - --set-secrets=FIREBASE_ADMIN_PRIVATE_KEY=FIREBASE_ADMIN_PRIVATE_KEY:latest,FIREBASE_ADMIN_CLIENT_EMAIL=FIREBASE_ADMIN_CLIENT_EMAIL:latest,ANTHROPIC_API_KEY=ANTHROPIC_API_KEY:latest,FRED_API_KEY=FRED_API_KEY:latest,PADDLE_API_KEY=PADDLE_API_KEY:latest,PADDLE_WEBHOOK_SECRET=PADDLE_WEBHOOK_SECRET:latest,PADDLE_STANDARD_PRICE_ID=PADDLE_STANDARD_PRICE_ID:latest,PADDLE_DEEP_PRICE_ID=PADDLE_DEEP_PRICE_ID:latest,PADDLE_CLIENT_TOKEN=PADDLE_CLIENT_TOKEN:latest,MARKETING_CRON_SECRET=MARKETING_CRON_SECRET:latest

images:
  - $_IMAGE:$SHORT_SHA
  - $_IMAGE:latest

options:
  logging: CLOUD_LOGGING_ONLY
